name: Reset přihlášení (pondělí 23:00 Praha)

on:
  schedule:
    # Cron běží v UTC. Praha = UTC+1 (zima) / UTC+2 (léto).
    # Pro 23:00 SELČ (léto, UTC+2) → 21:00 UTC
    # Pro 23:00 SEČ  (zima, UTC+1) → 22:00 UTC
    # Spustíme obě — Supabase upsert je idempotentní, druhý běh nic nesmaže navíc.
    - cron: '0 21 * * 1'   # pondělí 23:00 SELČ (letní čas)
    - cron: '0 22 * * 1'   # pondělí 23:00 SEČ  (zimní čas)
  workflow_dispatch:       # možnost spustit ručně z GitHubu

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Smaž všechna přihlášení
        run: |
          curl -s -X DELETE \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rsvp?player_name=neq.null_placeholder" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json"
          echo "Reset dokončen: $(date)"
