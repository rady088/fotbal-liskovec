name: Reset přihlášení po zápase

on:
  schedule:
    # Spouštíme každých 15 minut
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-reset:
    runs-on: ubuntu-latest
    steps:
      - name: Zkontroluj čas zápasu a případně resetuj
        run: |
          # Načti datum zápasu z Supabase settings
          MATCH_DATETIME=$(curl -s \
            "${{ secrets.SUPABASE_URL }}/rest/v1/settings?key=eq.match_datetime&select=value" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['value'] if d and d[0]['value'] else '')")

          echo "Datum zápasu: $MATCH_DATETIME"

          if [ -z "$MATCH_DATETIME" ]; then
            echo "Datum zápasu není nastaveno, přeskakuji."
            exit 0
          fi

          MATCH_TS=$(date -d "$MATCH_DATETIME" +%s)
          RESET_TS=$((MATCH_TS + 16200))   # +4,5 hodiny
          NOW_TS=$(date +%s)
          WINDOW=900                         # 15 min tolerance

          echo "Reset naplánován na: $(date -d @$RESET_TS)"
          echo "Nyní: $(date)"

          if [ "$NOW_TS" -ge "$RESET_TS" ] && [ "$NOW_TS" -lt "$((RESET_TS + WINDOW))" ]; then
            echo "Čas resetu nastal — mažu přihlášení..."

            # 1) Smaž přihlášení
            curl -s -X DELETE \
              "${{ secrets.SUPABASE_URL }}/rest/v1/rsvp?player_name=neq.___placeholder___" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: application/json"

            echo "Přihlášení smazána."

            # 2) Vypočítej příští pondělí 17:30 Prague (UTC+2 léto / UTC+1 zima)
            NEXT_MONDAY=$(python3 << 'PYEOF'
from datetime import datetime, timedelta
import subprocess, json

# Aktuální čas v Prague (přibližně — pro výpočet data stačí UTC)
now = datetime.utcnow()

# Najdi příští pondělí
days_ahead = (7 - now.weekday()) % 7  # 0=pondělí
if days_ahead == 0:
    days_ahead = 7  # pokud je dnes pondělí, vezmi příští
next_monday = now + timedelta(days=days_ahead)
next_monday = next_monday.replace(hour=15, minute=30, second=0, microsecond=0)
# 17:30 Prague SELČ = 15:30 UTC (léto, UTC+2); bezpečná hodnota pro léto
# Uložíme jako lokální čas pro zobrazení v input
# Formát pro datetime-local input a popisek
local_str = next_monday.strftime('%Y-%m-%dT17:30')  # uložíme jako Prague local time
print(local_str)
PYEOF
)

            echo "Příští zápas nastaven na: $NEXT_MONDAY"

            # Sestav hezký popisek (cs den, datum)
            LABEL=$(python3 << PYEOF
from datetime import datetime
dt = datetime.strptime("$NEXT_MONDAY", "%Y-%m-%dT%H:%M")
days_cs = ['pondělí','úterý','středa','čtvrtek','pátek','sobota','neděle']
label = f"{days_cs[dt.weekday()]} {dt.day}. {dt.month}. · {dt.strftime('%H:%M')}"
print(label)
PYEOF
)

            echo "Popisek: $LABEL"

            # 3) Ulož nový datum zápasu do settings
            curl -s -X PATCH \
              "${{ secrets.SUPABASE_URL }}/rest/v1/settings?key=eq.match_datetime" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"value\": \"$NEXT_MONDAY\"}"

            curl -s -X PATCH \
              "${{ secrets.SUPABASE_URL }}/rest/v1/settings?key=eq.match_label" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"value\": \"$LABEL\"}"

            echo "Hotovo: reset dokončen, příští zápas nastaven na $LABEL"
          else
            echo "Ještě není čas na reset."
          fi
