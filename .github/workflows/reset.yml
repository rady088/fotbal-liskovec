name: Reset přihlášení po zápase

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-reset:
    runs-on: ubuntu-latest
    steps:
      - name: Zkontroluj čas zápasu a případně resetuj
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, datetime, sys, zoneinfo, os

          supabase_url = os.environ['SUPABASE_URL']
          supabase_key = os.environ['SUPABASE_KEY']
          prague = zoneinfo.ZoneInfo('Europe/Prague')

          def api(path, method='GET', data=None):
              req = urllib.request.Request(
                  supabase_url + path,
                  data=json.dumps(data).encode() if data else None,
                  method=method,
                  headers={
                      'apikey': supabase_key,
                      'Authorization': 'Bearer ' + supabase_key,
                      'Content-Type': 'application/json',
                      'Prefer': 'return=minimal'
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      body = r.read()
                      return json.loads(body) if body else {}
              except urllib.error.HTTPError as e:
                  print(f"HTTP Error: {e.code} {e.read()}")
                  return {}

          # Načti datum zápasu
          rows = api('/rest/v1/settings?key=eq.match_datetime&select=value')
          if not rows or not rows[0].get('value'):
              print("Datum zápasu není nastaveno, přeskakuji.")
              sys.exit(0)

          match_str = rows[0]['value']
          print(f"Datum zápasu: {match_str}")

          # Parsuj datum jako pražský čas
          match_time = datetime.datetime.fromisoformat(match_str).replace(tzinfo=prague)
          reset_time = match_time + datetime.timedelta(hours=5, minutes=30)
          now = datetime.datetime.now(prague)
          window = datetime.timedelta(minutes=15)

          print(f"Reset naplánován na: {reset_time.strftime('%Y-%m-%d %H:%M')} Praha")
          print(f"Nyní (Praha): {now.strftime('%Y-%m-%d %H:%M')}")

          if reset_time <= now < reset_time + window:
              print("Čas resetu nastal — mažu přihlášení...")
              api('/rest/v1/rsvp?player_name=neq.___placeholder___', method='DELETE')
              print("Přihlášení smazána.")

              # Vypočítej příští pondělí 17:30
              days_ahead = (7 - now.weekday()) % 7
              if days_ahead == 0:
                  days_ahead = 7
              next_monday = now + datetime.timedelta(days=days_ahead)
              next_monday = next_monday.replace(hour=17, minute=30, second=0, microsecond=0)
              next_str = next_monday.strftime('%Y-%m-%dT17:30')

              days_cs = ['Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota','Neděle']
              label = f"{days_cs[next_monday.weekday()]} {next_monday.day}. {next_monday.month}. {next_monday.year}  ·  🎲 los 16:30  ·  🤝 sraz 17:00  ·  ⚽ výkop 17:30"

              api('/rest/v1/settings?key=eq.match_datetime', method='PATCH', data={'value': next_str})
              api('/rest/v1/settings?key=eq.match_label', method='PATCH', data={'value': label})
              print(f"Příští zápas nastaven na: {label}")
          else:
              print("Ještě není čas na reset.")
          PYEOF
