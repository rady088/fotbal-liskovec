<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbal Lískovec</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a5c2a;
      --green-dark: #154d23;
      --green-light: #e6f4ea;
      --red-light: #fde8e8;
      --red: #c0392b;
      --bg: #f4f4f2;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --surface: #242422;
        --border: rgba(255,255,255,0.1);
        --text: #e8e8e4; --text-muted: #9a9a94;
        --green-light: #0d2e14; --red-light: #2e0d0d;
      }
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 2rem; }
    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
    .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; }
    @media (max-width: 600px) { .main-layout { grid-template-columns: 1fr; } }

    .section-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .07em; text-transform: uppercase; margin-bottom: 8px; }

    select, input[type="text"], input[type="password"], input[type="datetime-local"] {
      width: 100%; padding: 13px 14px; border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
      font-size: 16px; font-family: inherit; margin-bottom: 16px;
      appearance: none; -webkit-appearance: none;
    }
    select:focus, input:focus { outline: 2px solid var(--green); outline-offset: 1px; }

    .btn-go { width: 100%; padding: 18px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 18px; font-weight: 700; cursor: pointer; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-go:hover { background: var(--green-dark); }
    .btn-nogo { width: 100%; padding: 10px; background: var(--surface); color: var(--text-muted); border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn-nogo:hover { background: var(--bg); }

    /* Jen jedno velké počítadlo */
    .single-metric { text-align: center; padding: .75rem .5rem 1rem; }
    .single-metric .num { font-size: 48px; font-weight: 700; line-height: 1; color: var(--green); }
    .single-metric .lbl { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .match-card { background: var(--green); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .match-card .match-datetime { color: #fff; font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 4px; }
    .match-card .match-venue { color: rgba(255,255,255,0.75); font-size: 14px; }

    .player-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); margin-bottom: 5px; }
    .player-name { font-weight: 500; font-size: 13px; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .badge-go   { background: var(--green-light); color: var(--green); }
    .badge-nogo { background: var(--red-light);   color: var(--red); }

    .flash { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
    .flash.show { display: block; }
    .flash.ok  { background: var(--green-light); color: var(--green); }
    .flash.err { background: var(--red-light);   color: var(--red); }

    .empty   { text-align: center; padding: 1.5rem; color: var(--text-muted); font-size: 13px; }
    .loading { text-align: center; padding: 1rem;   color: var(--text-muted); font-size: 13px; }

    .next-reset    { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: .75rem; }

    /* ADMIN */
    .admin-bar { margin-top: 1rem; display: flex; justify-content: flex-end; }
    .btn-admin-toggle { background: none; border: none; font-size: 12px; color: var(--text-muted); cursor: pointer; padding: 4px 6px; border-radius: var(--radius-sm); }
    .btn-admin-toggle:hover { background: var(--bg); }
    .admin-panel { margin-top: .75rem; padding: 1rem; background: var(--bg); border-radius: var(--radius-sm); border: 0.5px solid var(--border); display: none; }
    .admin-panel.open { display: block; }
    .pin-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .pin-row input { width: 110px; margin-bottom: 0; letter-spacing: .2em; text-align: center; font-size: 16px; }
    .btn-sm { padding: 8px 13px; background: var(--surface); color: var(--text); border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { background: var(--green-light); color: var(--green); }
    .btn-reset { width: 100%; padding: 11px; background: var(--red-light); color: var(--red); border: 0.5px solid rgba(192,57,43,0.2); border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .btn-reset:hover { filter: brightness(0.95); }
    .pin-error { font-size: 12px; color: var(--red); margin-bottom: 8px; display: none; }
    .pin-error.show { display: block; }
    .admin-divider { height: .5px; background: var(--border); margin: 12px 0; }
    .admin-player-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); margin-bottom: 4px; background: var(--surface); font-size: 13px; }
    .btn-remove { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
    .btn-remove:hover { color: var(--red); }
    .add-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .add-row input { flex: 1; margin-bottom: 0; }
    .info-box { font-size: 12px; color: var(--text-muted); background: var(--surface); border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 6px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="container">

  <div id="flash" class="flash"></div>
  <div class="match-card">
    <div class="match-datetime" id="match-label">Načítám…</div>
    <div class="match-venue" id="match-venue"></div>
  </div>

  <div class="main-layout">

    <!-- LEVÝ SLOUPEC: formulář -->
    <div class="card">
      <div class="section-label">Hráč</div>
      <select id="player-select"><option value="">— vyber své jméno —</option></select>
      <input type="text" id="player-new" placeholder="Nebo napiš nové jméno…" />
      <button class="btn-go"   onclick="respond(true)">✓ Jdu!</button>
      <button class="btn-nogo" onclick="respond(false)">✕ Nejdu</button>
    </div>

    <!-- PRAVÝ SLOUPEC: přehled -->
    <div class="card">
      <div class="section-label">Přehled hráčů</div>

      <!-- Jen počítadlo těch co jdou -->
      <div class="single-metric">
        <div class="num go-color" id="cnt-go">–</div>
        <div class="lbl">hráčů potvrdilo účast</div>
      </div>

      <div id="rsvp-list"><div class="loading">Načítám…</div></div>
      <div class="next-reset" id="next-reset"></div>

      <!-- ADMIN -->
      <div class="admin-bar">
        <button class="btn-admin-toggle" onclick="toggleAdminPanel()" id="admin-toggle-btn">🔒 Admin</button>
      </div>
      <div class="admin-panel" id="admin-panel">
        <div class="section-label" style="margin-bottom:10px">Admin</div>

        <!-- PIN -->
        <div class="pin-row">
          <input type="password" id="admin-pin" maxlength="6" placeholder="PIN" oninput="document.getElementById('pin-error').classList.remove('show')" />
          <button class="btn-sm" id="btn-unlock" onclick="unlockAdmin()">Odemknout</button>
        </div>
        <div class="pin-error" id="pin-error">Špatný PIN</div>

        <div id="admin-actions" style="display:none">

          <!-- Datum a čas zápasu -->
          <div class="section-label">Datum a čas zápasu</div>
          <input type="datetime-local" id="match-datetime" style="margin-bottom:4px" />
          <div class="section-label" style="margin-top:4px">Místo zápasu</div>
          <select id="match-venue-select">
            <option value="Hřiště v Lískovci">Hřiště v Lískovci</option>
            <option value="Tělocvična Horničák">Tělocvična Horničák</option>
          </select>
          <button class="btn-sm" style="width:100%;margin-bottom:4px" onclick="saveMatchDatetime()">Uložit</button>
          <div class="info-box" id="reset-info">Reset přihlášení proběhne 4,5 h po zápase.</div>

          <div class="admin-divider"></div>

          <!-- Přidat hráče -->
          <div class="section-label">Přidat hráče</div>
          <div class="add-row">
            <input type="text" id="new-player-input" placeholder="Jméno…" onkeydown="if(event.key==='Enter')adminAddPlayer()" />
            <button class="btn-sm" onclick="adminAddPlayer()">+ Přidat</button>
          </div>

          <!-- Seznam hráčů -->
          <div class="section-label" style="margin-bottom:6px">Spravovat hráče</div>
          <div id="admin-players-list"><div class="loading">Načítám…</div></div>

          <div class="admin-divider"></div>

          <!-- Reset -->
          <button class="btn-reset" onclick="adminReset()">🗑 Resetovat všechna přihlášení</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ============================================================
  // KONFIGURACE
  // ============================================================
  const SUPABASE_URL = 'https://yfmioexaaviktarlblgi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_y9MR-PLatyZToB7oS1GzBg_ZDsDDA0m';
  const ADMIN_PIN    = '1212'; // ← změň na svůj PIN
  // ============================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ---- Načtení nastavení ze Supabase ----
  async function loadSettings() {
    const { data } = await sb.from('settings').select('key, value');
    const cfg = {};
    (data || []).forEach(r => cfg[r.key] = r.value);

    // Zobraz info o zápase
    const label = cfg['match_label'] || 'Nejbližší zápas';
    document.getElementById('match-label').textContent = label;

    // Zobraz místo
    const venue = cfg['match_venue'] || '';
    const venueEl = document.getElementById('match-venue');
    venueEl.textContent = venue ? '📍 ' + venue : '';

    // Zobraz příští reset
    renderNextReset(cfg['match_datetime'] || null);

    return cfg;
  }

  function renderNextReset(datetimeStr) {
    const el = document.getElementById('next-reset');
    if (!datetimeStr) { el.textContent = 'Datum zápasu není nastaveno.'; return; }
    const matchTime = new Date(datetimeStr);
    const resetTime = new Date(matchTime.getTime() + 4.5 * 60 * 60 * 1000);
    el.textContent = 'Reset přihlášení: ' +
      resetTime.toLocaleDateString('cs-CZ', { weekday:'short', day:'numeric', month:'numeric' }) +
      ' v ' + resetTime.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
  }

  // ---- Hráči ----
  async function loadPlayers() {
    const { data } = await sb.from('players').select('name').order('name');
    const sel = document.getElementById('player-select');
    sel.innerHTML = '<option value="">— vyber své jméno —</option>';
    (data || []).forEach(p => {
      const o = document.createElement('option');
      o.value = o.textContent = p.name;
      sel.appendChild(o);
    });
  }

  // ---- RSVP přehled ----
  async function loadRsvp() {
    const { data } = await sb.from('rsvp').select('player_name, going').order('updated_at', { ascending: false });
    const rows = data || [];
    const go   = rows.filter(r => r.going);
    const nogo = rows.filter(r => !r.going);
    const total = rows.length;

    document.getElementById('cnt-go').textContent  = go.length;

    const list = document.getElementById('rsvp-list');
    if (!rows.length) { list.innerHTML = '<div class="empty">Zatím žádné odpovědi</div>'; return; }
    list.innerHTML = [...go, ...nogo].map(r =>
      `<div class="player-row">
        <span class="player-name">${esc(r.player_name)}</span>
        <span class="badge ${r.going ? 'badge-go' : 'badge-nogo'}">${r.going ? 'Jdu' : 'Nejdu'}</span>
      </div>`
    ).join('');
  }

  // ---- Odpověď hráče ----
  async function respond(going) {
    const name = document.getElementById('player-select').value ||
                 document.getElementById('player-new').value.trim();
    if (!name) { flash('Nejdřív vyber nebo napiš své jméno.', false); return; }
    await sb.from('players').upsert({ name }, { onConflict: 'name', ignoreDuplicates: true });
    const { error } = await sb.from('rsvp').upsert(
      { player_name: name, going, updated_at: new Date().toISOString() },
      { onConflict: 'player_name' }
    );
    if (error) { flash('Chyba při ukládání. Zkus to znovu.', false); return; }
    flash(going ? `Super, ${name} — těšíme se! 👍` : `Škoda, ${name} — příště snad!`, going);
    document.getElementById('player-select').value = '';
    document.getElementById('player-new').value = '';
    await loadPlayers();
    await loadRsvp();
  }

  // ---- Helpers ----
  function flash(msg, ok) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.className = 'flash show ' + (ok ? 'ok' : 'err');
    setTimeout(() => el.classList.remove('show'), 4000);
  }
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Realtime
  sb.channel('rsvp-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rsvp' }, loadRsvp)
    .subscribe();

  // ---- ADMIN ----
  function toggleAdminPanel() {
    const panel = document.getElementById('admin-panel');
    const isOpen = panel.classList.toggle('open');
    document.getElementById('admin-toggle-btn').textContent = isOpen ? '✕ Zavřít' : '🔒 Admin';
    if (!isOpen) lockAdmin();
  }

  function unlockAdmin() {
    const pin = document.getElementById('admin-pin').value;
    if (pin === ADMIN_PIN) {
      document.getElementById('admin-actions').style.display = 'block';
      document.getElementById('admin-pin').disabled = true;
      document.getElementById('btn-unlock').textContent = '✓ Odemčeno';
      document.getElementById('btn-unlock').style.color = 'var(--green)';
      document.getElementById('pin-error').classList.remove('show');
      loadAdminPlayers();
      loadMatchDatetime();
    } else {
      document.getElementById('pin-error').classList.add('show');
      document.getElementById('admin-pin').value = '';
    }
  }

  function lockAdmin() {
    document.getElementById('admin-actions').style.display = 'none';
    document.getElementById('admin-pin').disabled = false;
    document.getElementById('admin-pin').value = '';
    document.getElementById('btn-unlock').textContent = 'Odemknout';
    document.getElementById('btn-unlock').style.color = '';
    document.getElementById('pin-error').classList.remove('show');
    document.getElementById('new-player-input').value = '';
  }

  // Načti aktuální datum zápasu a místo do admin inputů
  async function loadMatchDatetime() {
    const { data } = await sb.from('settings').select('key, value').in('key', ['match_datetime', 'match_venue']);
    const cfg = {};
    (data || []).forEach(r => cfg[r.key] = r.value);
    if (cfg['match_datetime']) {
      document.getElementById('match-datetime').value = cfg['match_datetime'].slice(0, 16);
      updateResetInfo(cfg['match_datetime']);
    }
    if (cfg['match_venue']) {
      document.getElementById('match-venue-select').value = cfg['match_venue'];
    }
  }

  function updateResetInfo(datetimeStr) {
    if (!datetimeStr) return;
    const matchTime = new Date(datetimeStr);
    const resetTime = new Date(matchTime.getTime() + 4.5 * 60 * 60 * 1000);
    document.getElementById('reset-info').textContent =
      'Reset přihlášení proběhne: ' +
      resetTime.toLocaleDateString('cs-CZ', { weekday:'short', day:'numeric', month:'numeric' }) +
      ' v ' + resetTime.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
  }

  // Uložit datum, čas a místo zápasu
  async function saveMatchDatetime() {
    const val = document.getElementById('match-datetime').value;
    const venue = document.getElementById('match-venue-select').value;
    if (!val) { flash('Vyber datum a čas zápasu.', false); return; }

    // Sestav hezký popisek pro hráče
    const dt = new Date(val);
    const dayRaw = dt.toLocaleDateString('cs-CZ', { weekday:'long', day:'numeric', month:'numeric', year:'numeric' });
    const dayCapitalized = dayRaw.charAt(0).toUpperCase() + dayRaw.slice(1);
    const timeStr = dt.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
    const srazDt = new Date(dt.getTime() - 30 * 60 * 1000);
    const srazStr = srazDt.toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
    const label = dayCapitalized + '  ' + timeStr + '  (sraz ' + srazStr + ')';

    // Ulož do settings
    await sb.from('settings').upsert({ key: 'match_datetime', value: val },   { onConflict: 'key' });
    await sb.from('settings').upsert({ key: 'match_label',    value: label }, { onConflict: 'key' });
    await sb.from('settings').upsert({ key: 'match_venue',    value: venue }, { onConflict: 'key' });

    document.getElementById('match-label').textContent = label;
    document.getElementById('match-venue').textContent = venue ? '📍 ' + venue : '';
    updateResetInfo(val);
    renderNextReset(val);
    flash('Uloženo.', true);
  }

  // Seznam hráčů v admin panelu
  async function loadAdminPlayers() {
    const { data } = await sb.from('players').select('name').order('name');
    const list = document.getElementById('admin-players-list');
    if (!data || !data.length) { list.innerHTML = '<div class="empty">Žádní hráči</div>'; return; }
    list.innerHTML = data.map(p =>
      `<div class="admin-player-row">
        <span>${esc(p.name)}</span>
        <button class="btn-remove" onclick="adminRemovePlayer('${esc(p.name)}')" title="Odebrat">✕</button>
      </div>`
    ).join('');
  }

  async function adminAddPlayer() {
    const name = document.getElementById('new-player-input').value.trim();
    if (!name) return;
    const { error } = await sb.from('players').insert({ name });
    if (error) { flash('Hráč již existuje nebo chyba: ' + error.message, false); return; }
    document.getElementById('new-player-input').value = '';
    flash(`Hráč ${name} přidán.`, true);
    await loadAdminPlayers();
    await loadPlayers();
  }

  async function adminRemovePlayer(name) {
    const { error } = await sb.from('players').delete().eq('name', name);
    if (error) { flash('Chyba: ' + error.message, false); return; }
    flash(`Hráč ${name} odebrán.`, true);
    await loadAdminPlayers();
    await loadPlayers();
    await loadRsvp();
  }

  async function adminReset() {
    const { error } = await sb.from('rsvp').delete().neq('player_name', '___placeholder___');
    if (error) { flash('Chyba při resetování: ' + error.message, false); return; }
    flash('Přihlášení byla resetována.', true);
    lockAdmin();
    document.getElementById('admin-panel').classList.remove('open');
    document.getElementById('admin-toggle-btn').textContent = '🔒 Admin';
    await loadRsvp();
  }

  // Init
  loadSettings();
  loadPlayers();
  loadRsvp();
</script>
</body>
</html>
