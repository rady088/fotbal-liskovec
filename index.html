<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbal Lískovec</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a5c2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FK Lískovec" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --green:#1a5c2a;--green-dark:#154d23;--green-light:#e6f4ea;
      --red:#c0392b;--red-light:#fde8e8;
      --bg:#f4f4f2;--surface:#fff;--border:rgba(0,0,0,0.1);
      --text:#1a1a18;--text-muted:#6b6b67;--radius:12px;--radius-sm:8px;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1a1a18;--surface:#242422;--border:rgba(255,255,255,0.1);--text:#e8e8e4;--text-muted:#9a9a94;--green-light:#0d2e14;--red-light:#2e0d0d;}
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:2rem}
    .container{max-width:900px;margin:0 auto;padding:1rem}
    .match-card{background:var(--green);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem}
    .match-card .mdt{color:#fff;font-size:20px;font-weight:700;line-height:1.3;margin-bottom:3px}
    .match-card .mvn{color:rgba(255,255,255,.7);font-size:13px}
    .card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:1.25rem}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
    @media(max-width:600px){.two-col{grid-template-columns:1fr}}
    .section-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
    select,input[type="text"],input[type="password"],input[type="datetime-local"],input[type="number"]{
      width:100%;padding:16px;border:.5px solid var(--border);border-radius:var(--radius-sm);
      background:var(--surface);color:var(--text);font-size:17px;font-family:inherit;margin-bottom:20px;appearance:none}
    input[type="number"].sm{padding:7px 8px;font-size:13px;margin-bottom:0;width:65px}
    select:focus,input:focus{outline:2px solid var(--green);outline-offset:1px}
    .btn-go{width:100%;padding:22px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:20px;font-weight:700;cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-go:hover{background:var(--green-dark)}
    .btn-nogo{width:70%;margin:0 auto;padding:9px;background:var(--surface);color:var(--text-muted);border:.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-nogo:hover{background:var(--bg)}
    .btn-sm{padding:8px 13px;background:var(--surface);color:var(--text);border:.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;cursor:pointer;white-space:nowrap}
    .btn-sm:hover{background:var(--green-light);color:var(--green)}
    .btn-danger{width:100%;padding:11px;background:var(--red-light);color:var(--red);border:.5px solid rgba(192,57,43,.2);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer}
    .flash{border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;margin-bottom:1rem;display:none}
    .flash.show{display:block}
    .flash.ok{background:var(--green-light);color:var(--green)}
    .flash.err{background:var(--red-light);color:var(--red)}
    .single-metric{text-align:center;padding:.75rem .5rem 1rem}
    .single-metric .num{font-size:48px;font-weight:700;line-height:1;color:var(--green)}
    .single-metric .lbl{font-size:13px;color:var(--text-muted);margin-top:4px}
    .player-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:var(--radius-sm);border:.5px solid var(--border);margin-bottom:5px}
    .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
    .badge-go{background:var(--green-light);color:var(--green)}
    .badge-nogo{background:var(--red-light);color:var(--red)}
    .next-reset{font-size:12px;color:var(--text-muted);text-align:center;margin-top:.75rem}
    .admin-bar{margin-top:1rem;display:flex;justify-content:flex-end}
    .btn-admin-toggle{background:none;border:none;font-size:12px;color:var(--text-muted);cursor:pointer;padding:4px 6px;border-radius:var(--radius-sm)}
    .btn-admin-toggle:hover{background:var(--bg)}
    .admin-panel{margin-top:.75rem;padding:1rem;background:var(--bg);border-radius:var(--radius-sm);border:.5px solid var(--border);display:none}
    .admin-panel.open{display:block}
    .pin-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .pin-row input{width:110px;margin-bottom:0;letter-spacing:.2em;text-align:center;font-size:16px}
    .pin-error{font-size:12px;color:var(--red);margin-bottom:8px;display:none}
    .pin-error.show{display:block}
    .admin-divider{height:.5px;background:var(--border);margin:12px 0}
    .apr{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--radius-sm);border:.5px solid var(--border);margin-bottom:4px;background:var(--surface);font-size:13px}
    .apr .pn{flex:1;font-weight:500}
    .btn-rm{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 4px}
    .btn-rm:hover{color:var(--red)}
    .add-row{display:flex;gap:6px;margin-bottom:10px;align-items:center}
    .add-row input{flex:1;margin-bottom:0}
    .info-box{font-size:12px;color:var(--text-muted);background:var(--surface);border-radius:var(--radius-sm);padding:8px 10px;margin-top:6px;line-height:1.5}
    .empty{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:13px}
    .loading{text-align:center;padding:1rem;color:var(--text-muted);font-size:13px}
  </style>
</head>
<body>
<div class="container">
  <div id="flash" class="flash"></div>
  <div class="match-card">
    <div class="mdt" id="match-label">Načítám…</div>
    <div class="mvn" id="match-venue"></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="section-label">Hráč</div>
      <select id="player-select"><option value="">— vyber své jméno —</option></select>
      <input type="text" id="player-new" placeholder="Nebo napiš nové jméno…" />
      <button class="btn-go" onclick="respond(true)">✓ Jdu!</button>
      <button class="btn-nogo" onclick="respond(false)">✕ Nejdu</button>
    </div>
    <div class="card">
      <div class="section-label">Přehled hráčů</div>
      <div class="single-metric">
        <div class="num" id="cnt-go">–</div>
        <div class="lbl">hráčů potvrdilo účast</div>
      </div>
      <div id="rsvp-list"><div class="loading">Načítám…</div></div>
      <div class="next-reset" id="next-reset"></div>
      <div class="admin-bar">
        <button class="btn-admin-toggle" onclick="toggleAdmin()" id="admin-toggle-btn">🔒 Admin</button>
      </div>
      <div class="admin-panel" id="admin-panel">
        <div class="section-label" style="margin-bottom:10px">Admin</div>
        <div class="pin-row">
          <input type="password" id="admin-pin" maxlength="6" placeholder="PIN"
            oninput="document.getElementById('pin-error').classList.remove('show')"
            onkeydown="if(event.key==='Enter')unlockAdmin()" />
          <button class="btn-sm" id="btn-unlock" onclick="unlockAdmin()">Odemknout</button>
        </div>
        <div class="pin-error" id="pin-error">Špatný PIN</div>
        <div id="admin-actions" style="display:none">
          <div class="section-label">Datum a čas zápasu</div>
          <input type="datetime-local" id="match-datetime" style="margin-bottom:6px" />
          <div class="section-label" style="margin-top:2px">Místo zápasu</div>
          <select id="match-venue-sel" style="margin-bottom:6px">
            <option value="Hřiště v Lískovci">Hřiště v Lískovci</option>
            <option value="Tělocvična Horničák">Tělocvična Horničák</option>
          </select>
          <button class="btn-sm" style="width:100%;margin-bottom:6px" onclick="saveMatchDatetime()">Uložit zápas</button>
          <div class="info-box" id="reset-info">Reset přihlášení proběhne 4,5 h po zápase.</div>
          <div class="admin-divider"></div>
          <div class="section-label">Přidat hráče</div>
          <div class="add-row">
            <input type="text" id="new-player-input" placeholder="Jméno…" style="margin-bottom:0"
              onkeydown="if(event.key==='Enter')adminAddPlayer()" />
            <input type="number" id="new-player-level" placeholder="Lvl" min="0" max="10" step="0.5" class="sm" />
            <button class="btn-sm" onclick="adminAddPlayer()">+ Přidat</button>
          </div>
          <div class="section-label" style="margin-bottom:6px">Hráči & levely</div>
          <div id="admin-players-list"><div class="loading">Načítám…</div></div>
          <div class="admin-divider"></div>
          <button class="btn-danger" onclick="adminReset()">🗑 Resetovat přihlášení</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  const SUPABASE_URL = 'DOPLŇ_SUPABASE_URL';
  const SUPABASE_KEY = 'DOPLŇ_SUPABASE_ANON_KEY';
  const ADMIN_PIN    = '1234';
  // ============================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadSettings() {
    const {data} = await sb.from('settings').select('key,value');
    const cfg={}; (data||[]).forEach(r=>cfg[r.key]=r.value);
    document.getElementById('match-label').textContent = cfg['match_label']||'Nejbližší zápas';
    document.getElementById('match-venue').textContent = cfg['match_venue']?'📍 '+cfg['match_venue']:'';
    renderNextReset(cfg['match_datetime']||null);
  }

  function renderNextReset(dt) {
    const el=document.getElementById('next-reset');
    if(!dt){el.textContent='Datum zápasu není nastaveno.';return;}
    const r=new Date(new Date(dt).getTime()+4.5*60*60*1000);
    el.textContent='Reset přihlášení: '+r.toLocaleDateString('cs-CZ',{weekday:'short',day:'numeric',month:'numeric'})+' v '+r.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  }

  async function loadPlayers() {
    const {data}=await sb.from('players').select('name').order('name');
    const sel=document.getElementById('player-select');
    sel.innerHTML='<option value="">— vyber své jméno —</option>';
    (data||[]).forEach(p=>{const o=document.createElement('option');o.value=o.textContent=p.name;sel.appendChild(o);});
  }

  async function loadRsvp() {
    const {data}=await sb.from('rsvp').select('player_name,going').order('updated_at',{ascending:false});
    const rows=data||[], go=rows.filter(r=>r.going), nogo=rows.filter(r=>!r.going);
    document.getElementById('cnt-go').textContent=go.length;
    const list=document.getElementById('rsvp-list');
    if(!rows.length){list.innerHTML='<div class="empty">Zatím žádné odpovědi</div>';return;}
    list.innerHTML=[...go,...nogo].map(r=>
      `<div class="player-row"><span style="font-weight:500;font-size:13px">${esc(r.player_name)}</span>
       <span class="badge ${r.going?'badge-go':'badge-nogo'}">${r.going?'Jdu':'Nejdu'}</span></div>`
    ).join('');
  }

  async function respond(going) {
    const name=document.getElementById('player-select').value||document.getElementById('player-new').value.trim();
    if(!name){flash('Nejdřív vyber nebo napiš své jméno.',false);return;}
    await sb.from('players').upsert({name},{onConflict:'name',ignoreDuplicates:true});
    const {error}=await sb.from('rsvp').upsert({player_name:name,going,updated_at:new Date().toISOString()},{onConflict:'player_name'});
    if(error){flash('Chyba při ukládání.',false);return;}
    flash(going?`Super, ${name} — těšíme se! 👍`:`Škoda, ${name} — příště snad!`,going);
    document.getElementById('player-select').value='';
    document.getElementById('player-new').value='';
    await loadPlayers(); await loadRsvp();
  }

  sb.channel('rsvp').on('postgres_changes',{event:'*',schema:'public',table:'rsvp'},loadRsvp).subscribe();

  function flash(msg,ok){
    const el=document.getElementById('flash');
    el.textContent=msg;el.className='flash show '+(ok?'ok':'err');
    setTimeout(()=>el.classList.remove('show'),4000);
  }
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function toggleAdmin(){
    const panel=document.getElementById('admin-panel');
    const open=panel.classList.toggle('open');
    document.getElementById('admin-toggle-btn').textContent=open?'✕ Zavřít':'🔒 Admin';
    if(!open)lockAdmin();
  }

  function unlockAdmin(){
    if(document.getElementById('admin-pin').value===ADMIN_PIN){
      document.getElementById('admin-actions').style.display='block';
      document.getElementById('admin-pin').disabled=true;
      document.getElementById('btn-unlock').textContent='✓ Odemčeno';
      document.getElementById('btn-unlock').style.color='var(--green)';
      document.getElementById('pin-error').classList.remove('show');
      loadAdminPlayers(); loadMatchDatetime();
    } else {
      document.getElementById('pin-error').classList.add('show');
      document.getElementById('admin-pin').value='';
    }
  }

  function lockAdmin(){
    document.getElementById('admin-actions').style.display='none';
    document.getElementById('admin-pin').disabled=false;
    document.getElementById('admin-pin').value='';
    document.getElementById('btn-unlock').textContent='Odemknout';
    document.getElementById('btn-unlock').style.color='';
    document.getElementById('pin-error').classList.remove('show');
  }

  async function loadMatchDatetime(){
    const {data}=await sb.from('settings').select('key,value').in('key',['match_datetime','match_venue']);
    const cfg={}; (data||[]).forEach(r=>cfg[r.key]=r.value);
    if(cfg['match_datetime']){document.getElementById('match-datetime').value=cfg['match_datetime'].slice(0,16);updateResetInfo(cfg['match_datetime']);}
    if(cfg['match_venue']) document.getElementById('match-venue-sel').value=cfg['match_venue'];
  }

  function updateResetInfo(dt){
    const r=new Date(new Date(dt).getTime()+4.5*60*60*1000);
    document.getElementById('reset-info').textContent='Reset: '+r.toLocaleDateString('cs-CZ',{weekday:'short',day:'numeric',month:'numeric'})+' '+r.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
  }

  async function saveMatchDatetime(){
    const val=document.getElementById('match-datetime').value;
    const venue=document.getElementById('match-venue-sel').value;
    if(!val){flash('Vyber datum a čas.',false);return;}
    const dt=new Date(val);
    const dayRaw=dt.toLocaleDateString('cs-CZ',{weekday:'long',day:'numeric',month:'numeric',year:'numeric'});
    const day=dayRaw.charAt(0).toUpperCase()+dayRaw.slice(1);
    const vikop=dt.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
    const sraz=new Date(dt.getTime()-30*60000).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
    const los=new Date(dt.getTime()-60*60000).toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
    const label=day+'  ·  🎲 los '+los+'  ·  🤝 sraz '+sraz+'  ·  ⚽ výkop '+vikop;
    await sb.from('settings').upsert({key:'match_datetime',value:val},{onConflict:'key'});
    await sb.from('settings').upsert({key:'match_label',value:label},{onConflict:'key'});
    await sb.from('settings').upsert({key:'match_venue',value:venue},{onConflict:'key'});
    document.getElementById('match-label').textContent=label;
    document.getElementById('match-venue').textContent=venue?'📍 '+venue:'';
    updateResetInfo(val); renderNextReset(val); flash('Uloženo.',true);
  }

  async function loadAdminPlayers(){
    const {data}=await sb.from('players').select('name,level').order('name');
    const list=document.getElementById('admin-players-list');
    if(!data||!data.length){list.innerHTML='<div class="empty">Žádní hráči</div>';return;}
    list.innerHTML=data.map(p=>
      `<div class="apr"><span class="pn">${esc(p.name)}</span>
       <input type="number" class="sm" value="${p.level||0}" min="0" max="10" step="0.5"
         onchange="updateLevel('${esc(p.name)}',this.value)" title="Level" />
       <button class="btn-rm" onclick="adminRemovePlayer('${esc(p.name)}')" title="Odebrat">✕</button>
      </div>`
    ).join('');
  }

  async function updateLevel(name,val){await sb.from('players').update({level:parseFloat(val)||0}).eq('name',name);}

  async function adminAddPlayer(){
    const name=document.getElementById('new-player-input').value.trim();
    const level=parseFloat(document.getElementById('new-player-level').value)||0;
    if(!name) return;
    const {error}=await sb.from('players').insert({name,level});
    if(error){flash('Hráč již existuje nebo chyba.',false);return;}
    document.getElementById('new-player-input').value='';
    document.getElementById('new-player-level').value='';
    flash(`${name} přidán.`,true);
    await loadAdminPlayers(); await loadPlayers();
  }

  async function adminRemovePlayer(name){
    await sb.from('players').delete().eq('name',name);
    flash(`${name} odebrán.`,true);
    await loadAdminPlayers(); await loadPlayers(); await loadRsvp();
  }

  async function adminReset(){
    await sb.from('rsvp').delete().neq('player_name','___x___');
    flash('Přihlášení resetována.',true);
    lockAdmin();
    document.getElementById('admin-panel').classList.remove('open');
    document.getElementById('admin-toggle-btn').textContent='🔒 Admin';
    await loadRsvp();
  }

  loadSettings(); loadPlayers(); loadRsvp();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
