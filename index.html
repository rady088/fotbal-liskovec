<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotbal Lískovec</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a5c2a;
      --green-dark: #154d23;
      --green-light: #e6f4ea;
      --red-light: #fde8e8;
      --red: #c0392b;
      --bg: #f4f4f2;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --text-muted: #6b6b67;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --border: rgba(255,255,255,0.1);
        --text: #e8e8e4;
        --text-muted: #9a9a94;
        --green-light: #0d2e14;
        --red-light: #2e0d0d;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    .container { max-width: 900px; margin: 0 auto; padding: 1rem; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }

    /* Dvousloupcový layout */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }
    @media (max-width: 600px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      margin-bottom: 8px;
      appearance: none;
      -webkit-appearance: none;
    }
    select:focus, input:focus { outline: 2px solid var(--green); outline-offset: 1px; }

    .btn-go {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-go:hover { background: var(--green-dark); }
    .btn-go:active { transform: scale(0.98); }

    .btn-nogo {
      width: 100%; padding: 13px;
      background: var(--surface); color: var(--text);
      border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-nogo:hover { background: var(--bg); }
    .btn-nogo:active { transform: scale(0.98); }

    .metrics {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 1rem;
    }
    .metric {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: .75rem .5rem; text-align: center;
    }
    .metric .num { font-size: 22px; font-weight: 600; line-height: 1; }
    .metric .lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .go-color   { color: var(--green); }
    .nogo-color { color: var(--red); }

    .bar-wrap {
      height: 6px; background: var(--bg);
      border-radius: 3px; overflow: hidden; margin-bottom: 1rem;
    }
    .bar-fill {
      height: 100%; background: var(--green);
      border-radius: 3px; transition: width .4s;
    }

    .player-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border);
      margin-bottom: 5px;
    }
    .player-name { font-weight: 500; font-size: 13px; }
    .badge {
      font-size: 11px; padding: 3px 9px;
      border-radius: 20px; font-weight: 600;
    }
    .badge-go   { background: var(--green-light); color: var(--green); }
    .badge-nogo { background: var(--red-light);   color: var(--red); }

    .flash {
      border-radius: var(--radius-sm);
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 1rem; display: none;
    }
    .flash.show { display: block; }
    .flash.ok  { background: var(--green-light); color: var(--green); }
    .flash.err { background: var(--red-light);   color: var(--red); }

    .empty {
      text-align: center; padding: 1.5rem;
      color: var(--text-muted); font-size: 13px;
    }

    .loading { text-align: center; padding: 1rem; color: var(--text-muted); font-size: 13px; }

    .next-reset {
      font-size: 12px; color: var(--text-muted);
      text-align: center; margin-top: .75rem;
    }

    .match-info-bar {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 1rem; padding: 0 .25rem;
    }
  </style>
</head>
<body>
<div class="container">

  <div id="flash" class="flash"></div>

  <p class="match-info-bar" id="match-label"></p>

  <div class="main-layout">

    <!-- LEVÝ SLOUPEC: formulář -->
    <div class="card" id="form-card">
      <div class="section-label">Hráč</div>
      <select id="player-select">
        <option value="">— vyber své jméno —</option>
      </select>
      <input type="text" id="player-new" placeholder="Nebo napiš nové jméno…" />
      <button class="btn-go"   onclick="respond(true)">✓ Jdu!</button>
      <button class="btn-nogo" onclick="respond(false)">✕ Nejdu</button>
    </div>

    <!-- PRAVÝ SLOUPEC: přehled hráčů -->
    <div class="card">
      <div class="section-label">Přehled hráčů</div>
      <div class="metrics">
        <div class="metric"><div class="num"            id="cnt-total">–</div><div class="lbl">celkem</div></div>
        <div class="metric"><div class="num go-color"   id="cnt-go">–</div><div class="lbl">jdou</div></div>
        <div class="metric"><div class="num nogo-color" id="cnt-nogo">–</div><div class="lbl">nejdou</div></div>
      </div>
      <div class="bar-wrap"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
      <div id="rsvp-list"><div class="loading">Načítám…</div></div>
      <div class="next-reset" id="next-reset"></div>
    </div>

  </div>
</div>

<script>
  // ============================================================
  // KONFIGURACE — vyplň po vytvoření projektu v Supabase
  // ============================================================
  const SUPABASE_URL = 'https://yfmioexaaviktarlblgi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_y9MR-PLatyZToB7oS1GzBg_ZDsDDA0m';
  const MATCH_LABEL  = 'Pondělí 17:30';
  // ============================================================

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  document.getElementById('match-label').textContent = MATCH_LABEL;

  function nextMonday2300() {
    const now = new Date();
    const prague = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Prague' }));
    const day = prague.getDay();
    const daysUntil = day === 1 ? 7 : (8 - day) % 7;
    const next = new Date(prague);
    next.setDate(prague.getDate() + daysUntil);
    next.setHours(23, 0, 0, 0);
    return next;
  }
  const nr = nextMonday2300();
  document.getElementById('next-reset').textContent =
    'Přihlášení se resetuje v pondělí ' +
    nr.toLocaleDateString('cs-CZ', { day:'numeric', month:'numeric' }) + ' ve 23:00';

  async function loadPlayers() {
    const { data } = await sb.from('players').select('name').order('name');
    const sel = document.getElementById('player-select');
    sel.innerHTML = '<option value="">— vyber své jméno —</option>';
    (data || []).forEach(p => {
      const o = document.createElement('option');
      o.value = o.textContent = p.name;
      sel.appendChild(o);
    });
  }

  async function loadRsvp() {
    const { data } = await sb
      .from('rsvp')
      .select('player_name, going')
      .order('updated_at', { ascending: false });

    const rows  = data || [];
    const go    = rows.filter(r => r.going);
    const nogo  = rows.filter(r => !r.going);
    const total = rows.length;

    document.getElementById('cnt-total').textContent = total;
    document.getElementById('cnt-go').textContent    = go.length;
    document.getElementById('cnt-nogo').textContent  = nogo.length;
    const pct = total > 0 ? Math.round(go.length / total * 100) : 0;
    document.getElementById('bar-fill').style.width  = pct + '%';

    const list = document.getElementById('rsvp-list');
    if (!rows.length) {
      list.innerHTML = '<div class="empty">Zatím žádné odpovědi</div>';
      return;
    }
    list.innerHTML = [...go, ...nogo].map(r =>
      `<div class="player-row">
        <span class="player-name">${esc(r.player_name)}</span>
        <span class="badge ${r.going ? 'badge-go' : 'badge-nogo'}">${r.going ? 'Jdu' : 'Nejdu'}</span>
      </div>`
    ).join('');
  }

  async function respond(going) {
    const name = document.getElementById('player-select').value ||
                 document.getElementById('player-new').value.trim();
    if (!name) {
      flash('Nejdřív vyber nebo napiš své jméno.', false);
      return;
    }
    await sb.from('players').upsert({ name }, { onConflict: 'name', ignoreDuplicates: true });
    const { error } = await sb.from('rsvp').upsert(
      { player_name: name, going, updated_at: new Date().toISOString() },
      { onConflict: 'player_name' }
    );
    if (error) { flash('Chyba při ukládání. Zkus to znovu.', false); return; }
    flash(going ? `Super, ${name} — těšíme se! 👍` : `Škoda, ${name} — příště snad!`, going);
    document.getElementById('player-select').value = '';
    document.getElementById('player-new').value = '';
    await loadPlayers();
    await loadRsvp();
  }

  function flash(msg, ok) {
    const el = document.getElementById('flash');
    el.textContent = msg;
    el.className = 'flash show ' + (ok ? 'ok' : 'err');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  sb.channel('rsvp-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'rsvp' }, loadRsvp)
    .subscribe();

  loadPlayers();
  loadRsvp();
</script>
</body>
</html>
